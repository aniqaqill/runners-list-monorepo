# ==============================================================================
# Root compose.yaml — Full local development stack
# ==============================================================================
# Consolidates the per-module docker-compose files into a single file.
# Run with: task compose:up  OR  docker compose -f compose.yaml up --build -d
#
# Services:
#   postgres  — Postgres 15 (same version as Supabase)
#   api       — Go API (Fiber) on :8080
#   client    — Next.js on :3000
#   scraper   — Python scraper (paused; run manually)
# ==============================================================================

services:

  # ── Database ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: runners_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: runners_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API ───────────────────────────────────────────────────────────────────────
  # The Dockerfile uses distroless, but for local dev you may prefer the
  # Dockerfile.dev (with air hot-reload) if it exists in the api/ directory.
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: runners_api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: runners_db
      DB_PORT: "5432"
      # sslmode=require is set in database.go; local Postgres doesn't support TLS,
      # so override for dev only:
      DB_SSLMODE: disable
      JWT_SECRET: dev-jwt-secret-change-in-prod
      INTERNAL_API_KEY: dev-api-key-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Client ───────────────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: runners_web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    depends_on:
      - api

  # ── Scraper (manual) ─────────────────────────────────────────────────────────
  # The scraper runs once and exits; it's kept here for convenience.
  # To run manually: docker compose -f compose.yaml run --rm scraper
  scraper:
    build:
      context: ./scraper
    container_name: runners_scraper
    environment:
      API_URL: http://api:8080/api/v1/internal/sync
      INTERNAL_API_KEY: dev-api-key-change-in-prod
      SCRAPE_URL: ${SCRAPE_URL:-https://example.com}
    depends_on:
      api:
        condition: service_healthy
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  postgres_data:
