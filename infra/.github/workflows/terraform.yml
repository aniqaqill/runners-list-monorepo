name: Terraform Infrastructure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - 'plan'
          - 'apply'

env:
  TF_VERSION: '1.6'
  WORKING_DIR: './terraform'

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -recursive || true

      - name: Terraform Validate
        run: terraform validate

      # Sensitive variables passed via environment (not overriding tfvars)
      - name: Terraform Plan
        env:
          TF_VAR_db_host: ${{ secrets.SUPABASE_DB_HOST }}
          TF_VAR_db_user: ${{ secrets.SUPABASE_DB_USER }}
          TF_VAR_db_password: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_internal_api_key: ${{ secrets.INTERNAL_API_KEY }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          TF_VAR_db_host: ${{ secrets.SUPABASE_DB_HOST }}
          TF_VAR_db_user: ${{ secrets.SUPABASE_DB_USER }}
          TF_VAR_db_password: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_internal_api_key: ${{ secrets.INTERNAL_API_KEY }}
        run: terraform apply -auto-approve tfplan
