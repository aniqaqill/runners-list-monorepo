name: Terraform GCP Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "terraform/gcp/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/gcp/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]

env:
  TF_VERSION: "1.6"
  WORKING_DIR: "./terraform/gcp"
  GCP_REGION: "asia-southeast1"

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for Workload Identity Federation token exchange
      id-token: write
      pull-requests: write

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to GCP via Workload Identity Federation ───────────────
      # No long-lived keys! GitHub's OIDC token is exchanged for a short-lived
      # GCP access token. The WIF pool + provider were created by Terraform.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      # Sensitive vars are passed via TF_VAR_* — never committed to tfvars
      - name: Terraform Plan
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_github_org: ${{ secrets.GITHUB_ORG }}
          TF_VAR_db_host: ${{ secrets.SUPABASE_DB_HOST }}
          TF_VAR_db_user: ${{ secrets.SUPABASE_DB_USER }}
          TF_VAR_db_password: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_internal_api_key: ${{ secrets.INTERNAL_API_KEY }}
        run: terraform plan -out=tfplan

      # Apply only on push to main OR when manually triggered with action=apply
      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_github_org: ${{ secrets.GITHUB_ORG }}
          TF_VAR_db_host: ${{ secrets.SUPABASE_DB_HOST }}
          TF_VAR_db_user: ${{ secrets.SUPABASE_DB_USER }}
          TF_VAR_db_password: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_internal_api_key: ${{ secrets.INTERNAL_API_KEY }}
        run: terraform apply -auto-approve tfplan
